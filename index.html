<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AquaDex</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AquaDex">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2972/2972144.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="header">
        <h1>AquaDex</h1>
        <input type="text" id="searchBar" placeholder="Search 500+ species..." onkeyup="searchFish()">
        
        <div class="filter-container">
            <button class="filter-btn active" onclick="filterByCategory('All')">All</button>
            <button class="filter-btn" onclick="filterByCategory('Shark')">Sharks</button>
            <button class="filter-btn" onclick="filterByCategory('Reef Fish')">Reef Fish</button>
            <button class="filter-btn" onclick="filterByCategory('Ray')">Rays</button>
        </div>

        <a href="log.html" class="nav-link">📂 View My Collection</a>
    </div>

    <div id="fishGrid" class="grid"></div>

    <script src="data.js"></script>
    <script src="engine.js"></script>
    <script src="logger.js"></script>
    
    <script>
        // Start the app once files are loaded
        window.onload = () => {
            if (typeof render === "function") render();
        };
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js');
            });
        }
    </script>
</body>
</html>
