<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AquaDex</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="dex-page">
        <div class="header">
            <h1>AquaDex</h1>
            <input type="text" id="searchBar" placeholder="Search species..." onkeyup="searchFish()">
            <div class="filter-container" id="dexFilters"></div>
            <div class="sort-container">
                <select id="sortSelect" onchange="handleSort()">
                    <option value="name_asc">Name (A-Z)</option>
                    <option value="name_desc">Name (Z-A)</option>
                    <option value="size_desc">Size (Large-Small)</option>
                    <option value="size_asc">Size (Small-Large)</option>
                    <option value="rarity_desc">Rarity (Legendary-Common)</option>
                    <option value="rarity_asc">Rarity (Common-Legendary)</option>
                    <option value="danger_desc">Danger (High-Low)</option>
                    <option value="danger_asc">Danger (Low-High)</option>
                    <option value="status_desc">IUCN Status (Risk)</option>
                </select>
            </div>
        </div>
        <div id="fishGrid" class="grid"></div>
    </div>

    <div id="log-page" style="display:none;">
        <div class="header">
            <h1>My Discoveries</h1>
            <div id="statsCounter"></div> 
            <div class="filter-container" id="logFilters"></div>
            <div class="log-controls">
                <select id="logSortSelect" onchange="renderLog()">
                    <option value="date_desc">Date (Newest)</option>
                    <option value="date_asc">Date (Oldest)</option>
                    <option value="count_desc">Sightings (Most)</option>
                    <option value="count_asc">Sightings (Least)</option>
                    <option value="name_asc">Name (A-Z)</option>
                </select>
                <button class="reset-btn" onclick="clearAllLogs()">Reset</button>
            </div>
        </div>
        <div id="logGrid" class="grid"></div>
    </div>

    <div id="achievements-page" style="display:none;">
        <div class="header"><h1>Trophy Room</h1></div>
        <div id="achievementsGrid" class="achievement-grid"></div>
    </div>

    <div id="detail-page" style="display:none;">
        <div class="detail-nav-overlay">
            <button class="close-detail" onclick="showPage('dex')">✕</button>
        </div>
        <div id="detailContent"></div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="showPage('dex')"><span>🔍</span><label>Dex</label></div>
        <div class="nav-item" onclick="showPage('log')"><span>📸</span><label>Log</label></div>
        <div class="nav-item" onclick="showPage('achievements')"><span>🏆</span><label>Trophies</label></div>
    </div>

    <div id="toast-container"></div>

    <script src="data.js"></script>
    <script src="ui.js"></script>
    <script src="logger.js"></script>
    <script src="achievements.js"></script>
    <script>
        window.onload = () => { 
            buildFilterBars(); 
            render(); 
            updateStats(); 
            // PWA Service Worker
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js').catch(() => {});
            }
        };
    </script>
</body>
</html>
